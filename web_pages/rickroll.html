<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-container {
            text-align: center;
            padding: 20px;
        }

        .fake-player {
            width: 320px;
            height: 180px;
            background: #111;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            margin: 0 auto;
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 0, 0, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            animation: playPulse 1.5s infinite;
        }

        @keyframes playPulse {
            50% {
                transform: scale(1.1);
                background: rgba(255, 0, 0, 1);
            }
        }

        .title-text {
            font-size: 16px;
            margin: 15px 0 5px;
        }

        .subtitle {
            font-size: 12px;
            color: #888;
        }

        .loading-dots {
            display: none;
            margin-top: 15px;
        }

        .loading-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff0000;
            margin: 0 4px;
            animation: dotBounce 0.6s infinite alternate;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotBounce {
            to {
                transform: translateY(-8px);
            }
        }
    </style>
</head>

<body>
    <div class="video-container" id="videoScreen">
        <div class="title-text">🎬 Maxfiy Video</div>
        <div class="subtitle">Ko'rish uchun bosing</div>
        <div class="fake-player" id="player" onclick="startRickroll()">
            <div class="play-btn">▶</div>
        </div>
        <div class="loading-dots" id="loadingDots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script>
        function startRickroll() {
            document.getElementById('loadingDots').style.display = 'block';
            document.querySelector('.subtitle').textContent = 'Yuklanmoqda...';
            document.getElementById('player').style.pointerEvents = 'none';

            setTimeout(() => {
                window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
            }, 2000);
        }
    </script>
</body>

</html>
