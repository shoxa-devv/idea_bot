<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .loader {
            text-align: center;
            color: #aaa;
            font-size: 16px;
        }

        .loader p {
            margin: 15px 0;
        }

        .dot-loader span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
            margin: 0 4px;
            animation: dotBounce 0.6s infinite alternate;
        }

        .dot-loader span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot-loader span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotBounce {
            to {
                background: #fff;
                transform: translateY(-5px);
            }
        }

        #scareContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: #000;
        }

        .scare-face {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .scare-emoji {
            font-size: 200px;
            animation: scarePulse 0.08s infinite alternate;
            filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.8));
        }

        @keyframes scarePulse {
            from {
                transform: scale(1) rotate(-8deg);
            }

            to {
                transform: scale(1.4) rotate(8deg);
            }
        }

        .scare-text {
            color: #ff0000;
            font-size: 32px;
            font-weight: bold;
            margin-top: 20px;
            animation: blink 0.15s infinite;
            text-shadow: 0 0 20px red;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
        }
    </style>
</head>

<body>
    <div class="screen-flash" id="flash"></div>
    <div class="loader" id="loaderScreen">
        <p>⏳ Sahifa yuklanmoqda...</p>
        <div class="dot-loader">
            <span></span><span></span><span></span>
        </div>
        <p style="font-size:12px;color:#555;">Iltimos kuting...</p>
    </div>

    <div id="scareContainer">
        <div class="scare-face">
            <div class="scare-emoji">👹</div>
            <div class="scare-text">☠️ QURILMA ZARARLANDI ☠️</div>
        </div>
    </div>

    <script>
        const flash = document.getElementById('flash');
        const colors = ['#ff0000', '#ffffff', '#000000'];
        let flashIndex = 0;

        setTimeout(() => {
            document.getElementById('loaderScreen').style.display = 'none';
            const scareEl = document.getElementById('scareContainer');
            scareEl.style.display = 'flex';

            if (navigator.vibrate) {
                navigator.vibrate([500, 100, 500, 100, 500, 100, 1000, 200, 1000]);
            }

            // Ekran flash effekti
            const flashInterval = setInterval(() => {
                flash.style.background = colors[flashIndex % colors.length];
                flash.style.opacity = '0.4';
                setTimeout(() => { flash.style.opacity = '0'; }, 80);
                flashIndex++;
            }, 200);

            // 8 soniyadan keyin flash to'xtaydi lekin scare qoladi
            setTimeout(() => {
                clearInterval(flashInterval);
            }, 8000);

        }, Math.random() * 1500 + 2000); // Random 2-3.5 soniya orasida
    </script>
</body>

</html>
